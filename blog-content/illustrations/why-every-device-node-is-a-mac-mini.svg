<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- eyebrow -->
  <text x="40" y="24" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">ONE NODE, BOTH PLATFORMS</text>

  <!-- constraint badge: padlock + label -->
  <path d="M91 58 v-4 a4 4 0 0 1 8 0 v4" stroke="var(--rt-muted)" stroke-width="1.25"/>
  <rect x="88" y="58" width="14" height="11" rx="1.5" stroke="var(--rt-muted)" stroke-width="1.25" fill="var(--rt-surface)"/>
  <text x="110" y="67" font-size="9.5" fill="var(--rt-muted)">macOS = Apple hardware only</text>
  <path d="M95 73 V104" stroke="var(--rt-line)" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- mac mini: low, flat, wide box -->
  <rect x="70" y="108" width="180" height="42" rx="5" fill="var(--rt-paper)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <circle cx="84" cy="141" r="1.5" fill="var(--rt-signal)"/>
  <text x="160" y="127" text-anchor="middle" font-size="12" fill="var(--rt-signal)">macOS</text>
  <text x="160" y="142" text-anchor="middle" font-size="9" fill="var(--rt-muted)">xcode · adb</text>
  <rect x="238" y="115" width="7" height="7" stroke="var(--rt-line-strong)" stroke-width="1" fill="var(--rt-surface)"/>
  <rect x="238" y="133" width="7" height="7" stroke="var(--rt-line-strong)" stroke-width="1" fill="var(--rt-surface)"/>
  <text x="160" y="170" text-anchor="middle" font-size="12" fill="var(--rt-signal)">MAC MINI · ONE NODE</text>

  <!-- dimension line under the mini -->
  <path d="M70 191 V199 M250 191 V199" stroke="var(--rt-line)" stroke-width="1"/>
  <path d="M70 195 H250" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="160" y="213" text-anchor="middle" font-size="9" letter-spacing="0.08em" fill="var(--rt-muted)">1 NODE · 2 PLATFORMS · 0 EXTRA HOSTS</text>

  <!-- connector: mini -> iPhone -->
  <path d="M250 119 H300 V78 H414" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <path d="M408 73 L415 78 L408 83" stroke="var(--rt-line-strong)" stroke-width="1.25"/>

  <!-- connector: mini -> Android -->
  <path d="M250 137 H300 V180 H414" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <path d="M408 175 L415 180 L408 185" stroke="var(--rt-line-strong)" stroke-width="1.25"/>

  <!-- iPhone glyph -->
  <rect x="420" y="46" width="36" height="64" rx="6" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <rect x="425" y="52" width="26" height="52" rx="2" fill="var(--rt-signal-soft)"/>
  <rect x="431" y="53" width="14" height="3" rx="1.5" fill="var(--rt-surface)"/>
  <path d="M432 100 H444" stroke="var(--rt-muted)" stroke-width="1.25"/>
  <text x="468" y="68" font-size="11" fill="var(--rt-ink)">iOS</text>
  <text x="468" y="82" font-size="9.5" fill="var(--rt-muted)">Xcode + XCUITest</text>
  <text x="468" y="94" font-size="9.5" fill="var(--rt-muted)">macOS-only</text>

  <!-- Android phone glyph -->
  <rect x="420" y="146" width="36" height="64" rx="4" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <rect x="425" y="154" width="26" height="50" rx="2" fill="var(--rt-signal-soft)"/>
  <circle cx="438" cy="150.5" r="1.3" fill="var(--rt-muted)"/>
  <text x="468" y="168" font-size="11" fill="var(--rt-ink)">Android</text>
  <text x="468" y="182" font-size="9.5" fill="var(--rt-muted)">ADB</text>
  <text x="468" y="194" font-size="9.5" fill="var(--rt-muted)">runs here too</text>

  <!-- bottom caption -->
  <text x="320" y="244" text-anchor="middle" font-size="11" fill="var(--rt-muted)">the constraint that became the standard</text>
</svg>
