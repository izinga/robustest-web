  <g font-size="13" fill="var(--rt-signal)">
    <text x="104" y="222" font-weight="600">RobusTest</text>
    <text x="352" y="222">▸</text>
    <text x="378" y="222" font-weight="600">still independent</text>
  </g>
</svg>
