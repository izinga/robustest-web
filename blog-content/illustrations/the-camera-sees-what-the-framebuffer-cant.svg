<svg viewBox="0 0 640 240" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <text x="320" y="22" text-anchor="middle" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">SAME PANEL · TWO READS</text>

  <!-- the panel: DRM video actually playing (real light on the glass) -->
  <rect x="256" y="70" width="128" height="98" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <rect x="268" y="82" width="104" height="62" fill="var(--rt-ink)"/>
  <path d="M311 100 L333 113 L311 126 Z" fill="var(--rt-signal)"/>
  <rect x="278" y="136" width="84" height="3" fill="var(--rt-muted)"/>
  <rect x="278" y="136" width="40" height="3" fill="var(--rt-signal)"/>
  <path d="M304 168 L300 180 H340 L336 168" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <path d="M290 180 H350" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <text x="320" y="200" text-anchor="middle" font-size="10" fill="var(--rt-muted)">the panel · DRM video playing</text>

  <!-- LEFT · framebuffer read comes back black -->
  <path d="M256 100 H176" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <path d="M186 94 L176 100 L186 106" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <text x="96" y="66" text-anchor="middle" font-size="10" fill="var(--rt-amber)">framebuffer read</text>
  <rect x="52" y="76" width="88" height="58" fill="var(--rt-ink)" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <text x="96" y="110" text-anchor="middle" font-size="12" fill="var(--rt-amber)">0x00</text>
  <text x="96" y="152" text-anchor="middle" font-size="11" fill="var(--rt-amber)">→ black</text>
  <text x="96" y="168" text-anchor="middle" font-size="9" fill="var(--rt-muted)">protected: no capture</text>

  <!-- RIGHT · camera read sees the real frame -->
  <path d="M384 100 H468" stroke="var(--rt-signal)" stroke-width="1.5" class="flow-path"/>
  <g stroke="var(--rt-signal)" stroke-width="1.5" fill="var(--rt-paper)">
    <rect x="470" y="80" width="58" height="42"/>
    <path d="M470 92 L452 84 V118 L470 110 Z"/>
    <rect x="486" y="72" width="18" height="10"/>
  </g>
  <circle cx="500" cy="101" r="8" fill="none" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="500" y="140" text-anchor="middle" font-size="10" fill="var(--rt-signal)">camera</text>

  <!-- what the camera captures: the real frame -->
  <path d="M528 101 H548" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <rect x="548" y="76" width="60" height="46" fill="var(--rt-ink)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <path d="M570 88 L588 99 L570 110 Z" fill="var(--rt-signal)"/>
  <text x="578" y="140" text-anchor="middle" font-size="10" fill="var(--rt-signal)">→ real frame</text>

  <text x="320" y="228" text-anchor="middle" font-size="11" fill="var(--rt-muted)">only the camera sees the light</text>
</svg>
