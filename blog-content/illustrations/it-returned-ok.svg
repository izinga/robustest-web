<svg viewBox="0 0 640 240" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <text x="40" y="24" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">ONE KEYPRESS · TWO SOCKETS</text>

  <!-- our client emits a keypress -->
  <rect x="32" y="90" width="112" height="52" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <text x="88" y="114" text-anchor="middle" font-size="12" fill="var(--rt-ink)">our client</text>
  <text x="88" y="130" text-anchor="middle" font-size="10" fill="var(--rt-muted)">write() → ✓ ok</text>

  <!-- the write travels to socket #1 (the one we still hold) -->
  <path d="M144 116 H228" stroke="var(--rt-amber)" stroke-width="1.5" class="flow-path"/>
  <rect x="168" y="88" width="13" height="11" fill="var(--rt-amber)"/>
  <text x="192" y="84" text-anchor="middle" font-size="10" fill="var(--rt-amber)">keypress</text>

  <!-- SOCKET #1 · stale -->
  <rect x="228" y="94" width="104" height="44" fill="var(--rt-paper)" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <path d="M228 104 h-6 M228 116 h-6 M228 128 h-6" stroke="var(--rt-amber)" stroke-width="1.25"/>
  <text x="280" y="112" text-anchor="middle" font-size="11" fill="var(--rt-amber)">socket #1</text>
  <text x="280" y="128" text-anchor="middle" font-size="10" fill="var(--rt-amber)">stale · abandoned</text>

  <!-- write falls into the void -->
  <path d="M332 116 H372" stroke="var(--rt-amber)" stroke-width="1.5" class="flow-path"/>
  <circle cx="390" cy="116" r="14" fill="none" stroke="var(--rt-amber)" stroke-width="1.25" stroke-dasharray="3 4"/>
  <text x="390" y="120" text-anchor="middle" font-size="12" fill="var(--rt-amber)">∅</text>
  <text x="388" y="150" text-anchor="middle" font-size="10" fill="var(--rt-amber)">dropped, silently</text>

  <!-- SOCKET #2 · live, opened behind us -->
  <rect x="228" y="170" width="104" height="44" fill="var(--rt-paper)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="280" y="188" text-anchor="middle" font-size="11" fill="var(--rt-signal)">socket #2</text>
  <text x="280" y="204" text-anchor="middle" font-size="10" fill="var(--rt-signal)">live · TV listens</text>
  <text x="158" y="196" font-size="10" fill="var(--rt-muted)">no writes</text>
  <path d="M226 192 H200" stroke="var(--rt-muted)" stroke-width="1.25" stroke-dasharray="2 4"/>

  <!-- socket #2 is wired to the TV, but carries nothing -->
  <path d="M332 192 H470" stroke="var(--rt-signal)" stroke-width="1.5" stroke-dasharray="2 5"/>

  <!-- the TV, unmoved -->
  <rect x="470" y="90" width="120" height="94" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <rect x="484" y="104" width="92" height="54" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <rect x="494" y="114" width="34" height="11" fill="var(--rt-line)"/>
  <g stroke="var(--rt-line)" stroke-width="1">
    <path d="M494 136 H566"/><path d="M494 148 H550"/>
  </g>
  <text x="530" y="176" text-anchor="middle" font-size="11" fill="var(--rt-muted)">highlight unmoved</text>

  <text x="320" y="230" text-anchor="middle" font-size="11" fill="var(--rt-muted)">"it returned OK" is not "it worked"</text>
</svg>
