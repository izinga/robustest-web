<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- eyebrow -->
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">INDIA · 152M PHONES / YEAR</text>
  <text x="600" y="22" text-anchor="end" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">≈95% ANDROID</text>

  <!-- market distribution bar (snapshot, by price tier) -->
  <rect x="40" y="48" width="320" height="44" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="200" y="67" text-anchor="middle" font-size="11" fill="var(--rt-signal)">ENTRY + BUDGET · UNDER $200</text>
  <text x="200" y="82" text-anchor="middle" font-size="10" fill="var(--rt-signal)">~57% of 152M</text>

  <rect x="360" y="48" width="165" height="44" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1"/>
  <text x="442" y="67" text-anchor="middle" font-size="10" fill="var(--rt-muted)">MID-RANGE</text>
  <text x="442" y="82" text-anchor="middle" font-size="9" fill="var(--rt-muted)">$200–400</text>

  <rect x="525" y="48" width="75" height="44" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="562" y="67" text-anchor="middle" font-size="9" fill="var(--rt-muted)">PREMIUM</text>
  <text x="562" y="82" text-anchor="middle" font-size="9" fill="var(--rt-muted)">over $400</text>

  <!-- scale ticks under the bar -->
  <line x1="40" y1="92" x2="40" y2="98" stroke="var(--rt-line)" stroke-width="1"/>
  <line x1="360" y1="92" x2="360" y2="98" stroke="var(--rt-line)" stroke-width="1"/>
  <line x1="600" y1="92" x2="600" y2="98" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="40" y="108" font-size="8" fill="var(--rt-muted)">0</text>
  <text x="360" y="108" text-anchor="middle" font-size="8" fill="var(--rt-muted)">57%</text>
  <text x="600" y="108" text-anchor="end" font-size="8" fill="var(--rt-muted)">100%</text>

  <!-- leader from budget segment to the phone -->
  <line x1="200" y1="92" x2="200" y2="118" stroke="var(--rt-signal)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- budget phone glyph -->
  <rect x="171" y="118" width="58" height="104" rx="7" fill="var(--rt-paper)" stroke="var(--rt-ink)" stroke-width="1.5"/>
  <line x1="192" y1="126" x2="208" y2="126" stroke="var(--rt-muted)" stroke-width="1"/>
  <rect x="178" y="132" width="44" height="66" fill="var(--rt-signal-soft)"/>
  <text x="200" y="161" text-anchor="middle" font-size="10" fill="var(--rt-signal)">3–4 GB</text>
  <text x="200" y="175" text-anchor="middle" font-size="9" fill="var(--rt-signal)">RAM</text>
  <line x1="190" y1="212" x2="210" y2="212" stroke="var(--rt-muted)" stroke-width="1"/>

  <!-- phone caption -->
  <text x="248" y="158" font-size="11" fill="var(--rt-ink)">the device your app</text>
  <text x="248" y="173" font-size="11" fill="var(--rt-ink)">is judged on</text>
  <text x="248" y="192" font-size="9" fill="var(--rt-muted)">720p · slow storage · aggressive RAM kills</text>

  <!-- flagship annotation off the premium tier -->
  <line x1="562" y1="92" x2="562" y2="126" stroke="var(--rt-line)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="600" y="141" text-anchor="end" font-size="10" fill="var(--rt-amber)">FLAGSHIP TEST DEVICE</text>
  <text x="600" y="156" text-anchor="end" font-size="9" fill="var(--rt-muted)">hides the bugs 57% of users hit</text>

  <!-- footer note -->
  <text x="320" y="246" text-anchor="middle" font-size="11" fill="var(--rt-muted)">test the low end, on real hardware</text>
</svg>
