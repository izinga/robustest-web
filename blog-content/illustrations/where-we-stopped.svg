<svg viewBox="0 0 640 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- our reimplemented client -->
  <rect x="44" y="80" width="124" height="44" fill="var(--rt-paper)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="106" y="106" text-anchor="middle" font-size="12" fill="var(--rt-signal)">native sdb</text>

  <!-- our path, stopped dead at the wall -->
  <path d="M168 102 H344" stroke="var(--rt-signal)" stroke-width="1.5" class="flow-path"/>
  <path d="M336 96 L344 102 L336 108" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="340" y="128" text-anchor="end" font-size="10" fill="var(--rt-muted)">we stopped here</text>

  <!-- the proprietary wall -->
  <path d="M356 44 V168" stroke="var(--rt-amber)" stroke-width="1.75" stroke-dasharray="2 5"/>
  <text x="398" y="80" font-size="12" fill="var(--rt-amber)">SAKEP</text>
  <text x="398" y="96" font-size="12" fill="var(--rt-amber)">_TV_REL</text>
  <text x="398" y="114" font-size="10" fill="var(--rt-muted)">(proprietary binary)</text>

  <!-- the TV, reachable only past the wall -->
  <rect x="530" y="62" width="88" height="80" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <rect x="543" y="74" width="62" height="40" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="574" y="132" text-anchor="middle" font-size="10" fill="var(--rt-muted)">TIZEN TV</text>

  <!-- the fallback: samsung's own binary goes over the wall -->
  <path d="M106 78 Q330 -2 566 60" stroke="var(--rt-muted)" stroke-width="1.25" stroke-dasharray="3 4"/>
  <path d="M556 52 L566 60 L554 63" stroke="var(--rt-muted)" stroke-width="1.25"/>
  <text x="330" y="22" text-anchor="middle" font-size="10" fill="var(--rt-muted)">fallback: samsung's own sdb binary</text>
</svg>
