<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- eyebrow + fig tag -->
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">ON-PREM &#8800; AIR-GAPPED</text>
  <text x="600" y="22" text-anchor="end" font-size="9" letter-spacing="0.1em" fill="var(--rt-muted)">FIG &#183; DEPLOYMENT MODELS</text>

  <!-- center divider -->
  <line x1="322" y1="64" x2="322" y2="204" stroke="var(--rt-line)" stroke-width="1" stroke-dasharray="2 5"/>

  <!-- ================= LEFT : ON-PREMISE ================= -->
  <text x="40" y="54" font-size="11" letter-spacing="0.1em" fill="var(--rt-muted)">ON-PREMISE</text>

  <!-- building -->
  <rect x="40" y="62" width="160" height="144" stroke="var(--rt-line-strong)" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="48" y="77" font-size="9" letter-spacing="0.08em" fill="var(--rt-muted)">YOUR BUILDING</text>

  <!-- lab box -->
  <rect x="54" y="88" width="132" height="38" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="11" fill="var(--rt-ink)">LAB BOX</text>
  <text x="120" y="119" text-anchor="middle" font-size="9" fill="var(--rt-muted)">devices &#183; data</text>

  <!-- dependency chips, all pointing OUT -->
  <rect x="54" y="138" width="132" height="13" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="60" y="148" font-size="9"><tspan fill="var(--rt-muted)">license </tspan><tspan fill="var(--rt-amber)">&#8594; vendor cloud</tspan></text>
  <rect x="54" y="155" width="132" height="13" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="60" y="165" font-size="9"><tspan fill="var(--rt-muted)">telemetry </tspan><tspan fill="var(--rt-amber)">&#8594; vendor</tspan></text>
  <rect x="54" y="172" width="132" height="13" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="60" y="182" font-size="9"><tspan fill="var(--rt-muted)">updates </tspan><tspan fill="var(--rt-amber)">&#8594; vendor cdn</tspan></text>
  <rect x="54" y="189" width="132" height="13" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="60" y="199" font-size="9"><tspan fill="var(--rt-muted)">control plane </tspan><tspan fill="var(--rt-amber)">&#8594; cloud</tspan></text>

  <!-- line out through the wall, unbroken -->
  <line x1="186" y1="104" x2="220" y2="104" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <polygon points="220,100 228,104 220,108" fill="var(--rt-amber)"/>

  <!-- vendor cloud, reachable -->
  <path transform="translate(226,76)" d="M8 40 a10 10 0 0 1 2 -20 a14 14 0 0 1 26 -6 a12 12 0 0 1 12 26 Z" stroke="var(--rt-amber)" stroke-width="1.5" fill="var(--rt-paper)"/>
  <text x="252" y="130" text-anchor="middle" font-size="9" fill="var(--rt-muted)">VENDOR CLOUD</text>
  <text x="254" y="143" text-anchor="middle" font-size="9" letter-spacing="0.1em" fill="var(--rt-amber)">STILL PHONES HOME</text>
  <text x="252" y="170" text-anchor="middle" font-size="9" fill="var(--rt-muted)">the box moved in,</text>
  <text x="252" y="183" text-anchor="middle" font-size="9" fill="var(--rt-muted)">the traffic didn&#8217;t</text>

  <!-- ================= RIGHT : AIR-GAPPED ================= -->
  <text x="344" y="54" font-size="11" letter-spacing="0.1em" fill="var(--rt-signal)">AIR-GAPPED</text>

  <!-- building -->
  <rect x="344" y="62" width="160" height="144" stroke="var(--rt-line-strong)" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="352" y="77" font-size="9" letter-spacing="0.08em" fill="var(--rt-muted)">YOUR BUILDING</text>

  <!-- lab box, self-contained -->
  <rect x="358" y="88" width="132" height="38" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="424" y="105" text-anchor="middle" font-size="11" fill="var(--rt-signal)">LAB BOX</text>
  <text x="424" y="119" text-anchor="middle" font-size="9" fill="var(--rt-muted)">self-contained</text>

  <!-- dependency chips, each answered INSIDE -->
  <rect x="358" y="138" width="132" height="13" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="364" y="148" font-size="9"><tspan fill="var(--rt-muted)">license </tspan><tspan fill="var(--rt-signal)">&#8594; offline</tspan></text>
  <rect x="358" y="155" width="132" height="13" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="364" y="165" font-size="9"><tspan fill="var(--rt-muted)">time </tspan><tspan fill="var(--rt-signal)">&#8594; internal ntp</tspan></text>
  <rect x="358" y="172" width="132" height="13" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="364" y="182" font-size="9"><tspan fill="var(--rt-muted)">updates </tspan><tspan fill="var(--rt-signal)">&#8594; local mirror</tspan></text>
  <rect x="358" y="189" width="132" height="13" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="364" y="199" font-size="9"><tspan fill="var(--rt-muted)">control plane </tspan><tspan fill="var(--rt-signal)">&#8594; on-site</tspan></text>

  <!-- severed line: a real GAP with end caps -->
  <line x1="490" y1="104" x2="524" y2="104" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <path d="M524 99 V109" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <path d="M550 99 V109" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <line x1="550" y1="104" x2="558" y2="104" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <text x="537" y="95" text-anchor="middle" font-size="9" letter-spacing="0.12em" fill="var(--rt-signal)">AIR GAP</text>
  <text x="537" y="126" text-anchor="middle" font-size="9" fill="var(--rt-signal)">no path out</text>

  <!-- internet, unreachable (dashed ghost) -->
  <path transform="translate(556,76)" d="M8 40 a10 10 0 0 1 2 -20 a14 14 0 0 1 26 -6 a12 12 0 0 1 12 26 Z" stroke="var(--rt-line)" stroke-width="1" stroke-dasharray="3 3" fill="var(--rt-paper)"/>
  <text x="584" y="70" text-anchor="middle" font-size="9" fill="var(--rt-muted)">INTERNET</text>
  <text x="564" y="170" text-anchor="middle" font-size="9" fill="var(--rt-muted)">every outside need</text>
  <text x="564" y="183" text-anchor="middle" font-size="9" fill="var(--rt-muted)">has an inside answer</text>

  <!-- caption -->
  <text x="320" y="241" text-anchor="middle" font-size="11" fill="var(--rt-muted)">unplug the internet &#8212; does it still work?</text>
</svg>
