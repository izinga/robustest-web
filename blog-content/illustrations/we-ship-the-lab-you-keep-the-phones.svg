<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- eyebrow -->
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">TWO KINDS OF HARDWARE</text>

  <!-- vertical ownership boundary -->
  <line x1="320" y1="38" x2="320" y2="218" stroke="var(--rt-line-strong)" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="310" y="90" width="20" height="82" fill="var(--rt-paper)"/>
  <text x="323" y="131" font-size="9" letter-spacing="0.14em" fill="var(--rt-muted)" text-anchor="middle" transform="rotate(-90 320 131)">OWNERSHIP</text>

  <!-- ============ LEFT: INFRASTRUCTURE ============ -->
  <text x="40" y="52" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">INFRASTRUCTURE &#183; OURS</text>

  <!-- four identical node glyphs -->
  <g>
    <rect x="48" y="64" width="200" height="26" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.2"/>
    <circle cx="62" cy="77" r="3" fill="var(--rt-signal)"/>
    <text x="148" y="81" text-anchor="middle" font-size="10" fill="var(--rt-signal)">RT-NODE</text>
    <line x1="216" y1="73" x2="238" y2="73" stroke="var(--rt-signal)" stroke-width="1"/>
    <line x1="216" y1="81" x2="238" y2="81" stroke="var(--rt-signal)" stroke-width="1"/>
  </g>
  <g>
    <rect x="48" y="98" width="200" height="26" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.2"/>
    <circle cx="62" cy="111" r="3" fill="var(--rt-signal)"/>
    <text x="148" y="115" text-anchor="middle" font-size="10" fill="var(--rt-signal)">RT-NODE</text>
    <line x1="216" y1="107" x2="238" y2="107" stroke="var(--rt-signal)" stroke-width="1"/>
    <line x1="216" y1="115" x2="238" y2="115" stroke="var(--rt-signal)" stroke-width="1"/>
  </g>
  <g>
    <rect x="48" y="132" width="200" height="26" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.2"/>
    <circle cx="62" cy="145" r="3" fill="var(--rt-signal)"/>
    <text x="148" y="149" text-anchor="middle" font-size="10" fill="var(--rt-signal)">RT-NODE</text>
    <line x1="216" y1="141" x2="238" y2="141" stroke="var(--rt-signal)" stroke-width="1"/>
    <line x1="216" y1="149" x2="238" y2="149" stroke="var(--rt-signal)" stroke-width="1"/>
  </g>
  <g>
    <rect x="48" y="166" width="200" height="26" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.2"/>
    <circle cx="62" cy="179" r="3" fill="var(--rt-signal)"/>
    <text x="148" y="183" text-anchor="middle" font-size="10" fill="var(--rt-signal)">RT-NODE</text>
    <line x1="216" y1="175" x2="238" y2="175" stroke="var(--rt-signal)" stroke-width="1"/>
    <line x1="216" y1="183" x2="238" y2="183" stroke="var(--rt-signal)" stroke-width="1"/>
  </g>

  <!-- repetition bracket -->
  <line x1="256" y1="64" x2="256" y2="192" stroke="var(--rt-line)" stroke-width="1"/>
  <line x1="252" y1="64" x2="256" y2="64" stroke="var(--rt-line)" stroke-width="1"/>
  <line x1="252" y1="192" x2="256" y2="192" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="266" y="131" font-size="9" fill="var(--rt-muted)">&#215;N</text>

  <text x="148" y="211" text-anchor="middle" font-size="11" fill="var(--rt-signal)">one known-good config</text>

  <!-- ============ RIGHT: DEVICES ============ -->
  <text x="344" y="52" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">DEVICES &#183; YOURS</text>

  <!-- big phone -->
  <rect x="344" y="72" width="46" height="94" rx="5" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.2"/>
  <line x1="358" y1="80" x2="376" y2="80" stroke="var(--rt-line)" stroke-width="1"/>
  <rect x="350" y="86" width="34" height="66" fill="var(--rt-paper)"/>
  <circle cx="367" cy="159" r="2.5" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="367" y="181" text-anchor="middle" font-size="9" fill="var(--rt-muted)">6.7&#8243;</text>

  <!-- small phone -->
  <rect x="400" y="104" width="34" height="62" rx="4" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.2"/>
  <line x1="410" y1="111" x2="424" y2="111" stroke="var(--rt-line)" stroke-width="1"/>
  <rect x="405" y="116" width="24" height="40" fill="var(--rt-paper)"/>
  <circle cx="417" cy="161" r="2" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="417" y="181" text-anchor="middle" font-size="9" fill="var(--rt-muted)">5.4&#8243;</text>

  <!-- tablet -->
  <rect x="444" y="82" width="74" height="84" rx="5" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.2"/>
  <circle cx="481" cy="89" r="1.5" fill="var(--rt-line)"/>
  <rect x="451" y="94" width="60" height="62" fill="var(--rt-paper)"/>
  <text x="481" y="181" text-anchor="middle" font-size="9" fill="var(--rt-muted)">10.9&#8243;</text>

  <!-- TV -->
  <rect x="528" y="96" width="92" height="54" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.2"/>
  <rect x="533" y="101" width="82" height="44" fill="var(--rt-paper)"/>
  <line x1="574" y1="150" x2="574" y2="158" stroke="var(--rt-line-strong)" stroke-width="1.2"/>
  <line x1="556" y1="160" x2="592" y2="160" stroke="var(--rt-line-strong)" stroke-width="1.2"/>
  <text x="574" y="181" text-anchor="middle" font-size="9" fill="var(--rt-muted)">55&#8243;</text>

  <text x="482" y="211" text-anchor="middle" font-size="11" fill="var(--rt-muted)">your real fleet, all of it</text>

  <!-- bottom caption -->
  <text x="320" y="246" text-anchor="middle" font-size="11" fill="var(--rt-muted)">variation where it belongs, none where it isn't</text>
</svg>
