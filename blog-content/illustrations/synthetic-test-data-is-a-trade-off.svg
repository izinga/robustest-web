<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- eyebrow -->
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">THE SANITISE / FIDELITY TRADE-OFF</text>

  <!-- LEFT · real data record -->
  <text x="145" y="40" text-anchor="middle" font-size="10" letter-spacing="0.08em" fill="var(--rt-signal)">REAL DATA</text>
  <rect x="40" y="48" width="210" height="118" fill="var(--rt-paper)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <g>
    <rect x="52" y="58" width="186" height="22" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
    <text x="60" y="73" font-size="10" fill="var(--rt-ink)">name: 300 chars, unicode</text>
    <rect x="52" y="84" width="186" height="22" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
    <text x="60" y="99" font-size="10" fill="var(--rt-ink)">tz: +05:45 (Kathmandu)</text>
    <rect x="52" y="110" width="186" height="22" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
    <text x="60" y="125" font-size="10" fill="var(--rt-ink)">payment: partial</text>
  </g>
  <text x="52" y="153" font-size="10" fill="var(--rt-signal)">✓ catches the edge-case bug</text>

  <!-- left tag: in scope of the law -->
  <rect x="40" y="180" width="76" height="20" fill="none" stroke="var(--rt-amber)" stroke-width="1"/>
  <text x="78" y="193" text-anchor="middle" font-size="9" letter-spacing="0.08em" fill="var(--rt-amber)">IN SCOPE</text>
  <text x="126" y="193" font-size="9" fill="var(--rt-muted)">residency law applies</text>

  <!-- MIDDLE · trade-off gauge -->
  <text x="320" y="78" text-anchor="middle" font-size="9" letter-spacing="0.12em" fill="var(--rt-muted)">TRADE-OFF</text>
  <path d="M262 100 H378" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <path d="M270 95 L262 100 L270 105" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <path d="M370 95 L378 100 L370 105" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <circle cx="320" cy="100" r="6" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <text x="262" y="118" font-size="9" fill="var(--rt-signal)">FIDELITY</text>
  <text x="378" y="118" text-anchor="end" font-size="9" fill="var(--rt-muted)">COMPLIANCE</text>
  <text x="320" y="140" text-anchor="middle" font-size="9" fill="var(--rt-muted)">you can't maximise both</text>

  <!-- RIGHT · sanitized / synthetic record -->
  <text x="495" y="40" text-anchor="middle" font-size="10" letter-spacing="0.08em" fill="var(--rt-muted)">SANITIZED / SYNTHETIC</text>
  <rect x="390" y="48" width="210" height="118" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <g>
    <rect x="402" y="58" width="186" height="22" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
    <text x="410" y="73" font-size="10" fill="var(--rt-muted)">name: John Doe</text>
    <rect x="402" y="84" width="186" height="22" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
    <text x="410" y="99" font-size="10" fill="var(--rt-muted)">tz: UTC</text>
    <rect x="402" y="110" width="186" height="22" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
    <text x="410" y="125" font-size="10" fill="var(--rt-muted)">payment: OK</text>
  </g>
  <circle cx="409" cy="149" r="6" fill="var(--rt-amber)"/>
  <text x="409" y="152.5" text-anchor="middle" font-size="9" fill="var(--rt-paper)">!</text>
  <text x="421" y="153" font-size="10" fill="var(--rt-amber)">misses the bug</text>

  <!-- right tag: out of scope, but sticks to expected routes -->
  <text x="504" y="193" text-anchor="end" font-size="9" fill="var(--rt-muted)">sticks to expected routes</text>
  <rect x="512" y="180" width="88" height="20" fill="none" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="556" y="193" text-anchor="middle" font-size="9" letter-spacing="0.08em" fill="var(--rt-signal)">OUT OF SCOPE</text>

  <!-- bottom caption -->
  <text x="320" y="240" text-anchor="middle" font-size="11" fill="var(--rt-muted)">on-prem: realistic data that never leaves — <tspan fill="var(--rt-signal)">no trade</tspan></text>
</svg>
