<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">GDPR · CROSS-BORDER TRANSFER</text>

  <!-- the border between EEA and third country -->
  <path d="M320 52 V208" stroke="var(--rt-line-strong)" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- gate over the crossing · GDPR Chapter V -->
  <path d="M262 71 v5 M262 71 H378 M378 71 v5" stroke="var(--rt-line-strong)" stroke-width="1"/>
  <text x="320" y="66" text-anchor="middle" font-size="9" letter-spacing="0.08em" fill="var(--rt-muted)">GDPR CH.V · TRANSFER</text>

  <!-- EEA boundary box -->
  <rect x="36" y="52" width="136" height="156" fill="var(--rt-paper)" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <circle cx="116" cy="86" r="1.8" fill="var(--rt-signal)"/>
  <circle cx="110" cy="96.4" r="1.8" fill="var(--rt-signal)"/>
  <circle cx="98" cy="96.4" r="1.8" fill="var(--rt-signal)"/>
  <circle cx="92" cy="86" r="1.8" fill="var(--rt-signal)"/>
  <circle cx="98" cy="75.6" r="1.8" fill="var(--rt-signal)"/>
  <circle cx="110" cy="75.6" r="1.8" fill="var(--rt-signal)"/>
  <text x="104" y="120" text-anchor="middle" font-size="13" letter-spacing="0.08em" fill="var(--rt-signal)">EEA</text>
  <text x="104" y="136" text-anchor="middle" font-size="9" letter-spacing="0.08em" fill="var(--rt-muted)">PERSONAL DATA</text>

  <!-- packet waiting at the edge -->
  <rect x="140" y="160" width="24" height="16" rx="2" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1.1"/>
  <path d="M145 166 h14 M145 170 h9" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="104" y="192" text-anchor="middle" font-size="8" fill="var(--rt-muted)">waiting to cross</text>

  <!-- US cloud box -->
  <rect x="468" y="52" width="136" height="156" fill="var(--rt-paper)" stroke="var(--rt-muted)" stroke-width="1.25"/>
  <rect x="516" y="70" width="40" height="10" rx="1.5" fill="var(--rt-surface)" stroke="var(--rt-muted)" stroke-width="1"/>
  <circle cx="549" cy="75" r="1.5" fill="var(--rt-muted)"/>
  <rect x="516" y="83" width="40" height="10" rx="1.5" fill="var(--rt-surface)" stroke="var(--rt-muted)" stroke-width="1"/>
  <circle cx="549" cy="88" r="1.5" fill="var(--rt-muted)"/>
  <rect x="516" y="96" width="40" height="10" rx="1.5" fill="var(--rt-surface)" stroke="var(--rt-muted)" stroke-width="1"/>
  <circle cx="549" cy="101" r="1.5" fill="var(--rt-muted)"/>
  <text x="536" y="130" text-anchor="middle" font-size="12" fill="var(--rt-muted)">US CLOUD</text>
  <text x="536" y="146" text-anchor="middle" font-size="8" letter-spacing="0.08em" fill="var(--rt-muted)">THIRD COUNTRY</text>
  <text x="536" y="192" text-anchor="middle" font-size="8" fill="var(--rt-muted)">art. 44 · needs a basis</text>

  <!-- plank 1 · Safe Harbor · broken at the border -->
  <path d="M172 78 H298 L290 84 L299 90 L288 98 H172 Z" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1.25"/>
  <path d="M340 78 H468 V98 H332 L342 91 L334 85 Z" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1.25"/>
  <text x="182" y="91" font-size="9" fill="var(--rt-ink)">SAFE HARBOR</text>
  <text x="352" y="91" font-size="8" fill="var(--rt-amber)">STRUCK DOWN · 2015</text>
  <path d="M306 106 l16 -4 l2 5 l-16 4 Z" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1"/>

  <!-- plank 2 · Privacy Shield · broken at the border -->
  <path d="M172 118 H298 L290 124 L299 130 L288 138 H172 Z" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1.25"/>
  <path d="M340 118 H468 V138 H332 L342 131 L334 125 Z" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1.25"/>
  <text x="182" y="131" font-size="9" fill="var(--rt-ink)">PRIVACY SHIELD</text>
  <text x="352" y="131" font-size="8" fill="var(--rt-amber)">STRUCK DOWN · 2020</text>
  <path d="M306 146 l16 -4 l2 5 l-16 4 Z" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1"/>

  <!-- plank 3 · DPF · intact but cracked, under appeal -->
  <rect x="172" y="158" width="296" height="20" fill="var(--rt-surface)" stroke="var(--rt-amber)" stroke-width="1.25" stroke-dasharray="4 3"/>
  <path d="M319 158 l4 7 l-7 6 l5 7" stroke="var(--rt-amber)" stroke-width="1"/>
  <text x="182" y="172" font-size="9" fill="var(--rt-ink)">DPF · 2023</text>
  <path d="M252 163 l6 5 -6 5 M268 163 l6 5 -6 5" stroke="var(--rt-muted)" stroke-width="1"/>
  <text x="458" y="172" text-anchor="end" font-size="8" fill="var(--rt-amber)">ON APPEAL</text>

  <text x="320" y="240" text-anchor="middle" font-size="11" fill="var(--rt-muted)">built on ground that gave way twice</text>
</svg>
