<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">THE INVISIBLE VARIABLE</text>

  <!-- legend chip · known-good vs in-box -->
  <rect x="408" y="14" width="200" height="44" fill="var(--rt-surface)" stroke="var(--rt-line)" stroke-width="1"/>
  <rect x="412" y="21" width="192" height="14" fill="var(--rt-signal-soft)"/>
  <path d="M418 28 H454" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <text x="460" y="31" font-size="9" fill="var(--rt-signal)">known-good · tested</text>
  <path d="M418 46 H454" stroke="var(--rt-amber)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="460" y="49" font-size="9" fill="var(--rt-amber)">in-box · unknown spec</text>

  <!-- dimension callout: the cable is the only path -->
  <path d="M186 92 H494 M186 87 V97 M494 87 V97" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="340" y="84" text-anchor="middle" font-size="9" fill="var(--rt-muted)">the only path in or out</text>

  <!-- lab node -->
  <rect x="32" y="78" width="132" height="104" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <text x="98" y="102" text-anchor="middle" font-size="12" fill="var(--rt-ink)">lab node</text>
  <text x="98" y="117" text-anchor="middle" font-size="9" fill="var(--rt-muted)">usb host</text>
  <path d="M44 126 H152" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="98" y="145" text-anchor="middle" font-size="10" fill="var(--rt-amber)">device: present?</text>
  <text x="98" y="160" text-anchor="middle" font-size="9" fill="var(--rt-amber)">seen · lost · seen</text>
  <text x="98" y="175" text-anchor="middle" font-size="9" fill="var(--rt-muted)">re-enumerating…</text>

  <!-- node usb port + plug -->
  <rect x="160" y="123" width="10" height="16" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>
  <rect x="170" y="126" width="10" height="10" fill="var(--rt-amber)"/>

  <!-- the suspect cable: solid, then the link drops -->
  <path d="M180 131 Q260 161.5 340 161.5" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <path d="M340 161.5 Q420 161.5 500 131" stroke="var(--rt-amber)" stroke-width="1.5" stroke-dasharray="6 7"/>
  <!-- data packets make it partway -->
  <rect x="239" y="147" width="10" height="7" fill="var(--rt-amber)"/>
  <rect x="290" y="156" width="10" height="7" fill="var(--rt-amber)"/>
  <!-- dropout ticks at the break -->
  <path d="M334 170 L342 154 M344 170 L352 154" stroke="var(--rt-amber)" stroke-width="1.25"/>
  <text x="346" y="145" text-anchor="middle" font-size="9" fill="var(--rt-amber)">link drop ↯</text>
  <text x="340" y="188" text-anchor="middle" font-size="10" fill="var(--rt-amber)">in-box cable · degrades · drops the link</text>

  <!-- phone plug + port -->
  <rect x="500" y="126" width="10" height="10" fill="var(--rt-amber)"/>
  <rect x="510" y="123" width="10" height="16" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.25"/>

  <!-- phone under test -->
  <rect x="520" y="72" width="82" height="142" rx="10" fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <rect x="546" y="77" width="30" height="4" rx="2" fill="var(--rt-line)"/>
  <rect x="528" y="86" width="66" height="110" rx="3" fill="var(--rt-paper)" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="561" y="106" text-anchor="middle" font-size="11" fill="var(--rt-ink)">DUT</text>
  <text x="561" y="121" text-anchor="middle" font-size="9" fill="var(--rt-muted)">pixel · retail</text>
  <path d="M534 130 H588" stroke="var(--rt-line)" stroke-width="1"/>
  <text x="561" y="148" text-anchor="middle" font-size="9" fill="var(--rt-amber)">chg 5V ⌁ dips</text>
  <text x="561" y="164" text-anchor="middle" font-size="9" fill="var(--rt-amber)">usb: re-enum</text>
  <text x="561" y="180" text-anchor="middle" font-size="9" fill="var(--rt-amber)">adb: offline</text>

  <text x="320" y="244" text-anchor="middle" font-size="11" fill="var(--rt-muted)">the cheapest part, the most failures</text>
</svg>
