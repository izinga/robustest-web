<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <text x="58" y="24" font-size="10" letter-spacing="0.1em" fill="var(--rt-muted)">FRAMES @ 60Hz · a moving element, one frame dropped</text>

  <!-- filmstrip rails with sprocket holes -->
  <rect x="54" y="40" width="550" height="8" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <rect x="54" y="100" width="550" height="8" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <g fill="var(--rt-paper)" stroke="var(--rt-line-strong)" stroke-width="0.5">
    <rect x="60" y="42" width="6" height="4"/><rect x="84" y="42" width="6" height="4"/><rect x="108" y="42" width="6" height="4"/><rect x="132" y="42" width="6" height="4"/><rect x="156" y="42" width="6" height="4"/><rect x="180" y="42" width="6" height="4"/><rect x="204" y="42" width="6" height="4"/><rect x="228" y="42" width="6" height="4"/><rect x="252" y="42" width="6" height="4"/><rect x="276" y="42" width="6" height="4"/><rect x="300" y="42" width="6" height="4"/><rect x="324" y="42" width="6" height="4"/><rect x="348" y="42" width="6" height="4"/><rect x="372" y="42" width="6" height="4"/><rect x="396" y="42" width="6" height="4"/><rect x="420" y="42" width="6" height="4"/><rect x="444" y="42" width="6" height="4"/><rect x="468" y="42" width="6" height="4"/><rect x="492" y="42" width="6" height="4"/><rect x="516" y="42" width="6" height="4"/><rect x="540" y="42" width="6" height="4"/><rect x="564" y="42" width="6" height="4"/><rect x="588" y="42" width="6" height="4"/>
    <rect x="60" y="102" width="6" height="4"/><rect x="84" y="102" width="6" height="4"/><rect x="108" y="102" width="6" height="4"/><rect x="132" y="102" width="6" height="4"/><rect x="156" y="102" width="6" height="4"/><rect x="180" y="102" width="6" height="4"/><rect x="204" y="102" width="6" height="4"/><rect x="228" y="102" width="6" height="4"/><rect x="252" y="102" width="6" height="4"/><rect x="276" y="102" width="6" height="4"/><rect x="300" y="102" width="6" height="4"/><rect x="324" y="102" width="6" height="4"/><rect x="348" y="102" width="6" height="4"/><rect x="372" y="102" width="6" height="4"/><rect x="396" y="102" width="6" height="4"/><rect x="420" y="102" width="6" height="4"/><rect x="444" y="102" width="6" height="4"/><rect x="468" y="102" width="6" height="4"/><rect x="492" y="102" width="6" height="4"/><rect x="516" y="102" width="6" height="4"/><rect x="540" y="102" width="6" height="4"/><rect x="564" y="102" width="6" height="4"/><rect x="588" y="102" width="6" height="4"/>
  </g>

  <!-- 7 frame cells; a dot advances left→right; frame 4 is held (dropped) -->
  <!-- f1 -->
  <rect x="58" y="50" width="74" height="48" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <line x1="62" y1="90" x2="128" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="73" cy="74" r="5" fill="var(--rt-signal)"/>
  <!-- f2 -->
  <rect x="136" y="50" width="74" height="48" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <line x1="140" y1="90" x2="206" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="162" cy="74" r="5" fill="var(--rt-signal)"/>
  <!-- f3 -->
  <rect x="214" y="50" width="74" height="48" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <line x1="218" y1="90" x2="284" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="251" cy="74" r="5" fill="var(--rt-signal)"/>
  <!-- f4 · DROPPED: dot did not advance (same 50% as f3) -->
  <rect x="292" y="50" width="74" height="48" fill="var(--rt-paper)" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <line x1="296" y1="90" x2="362" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="329" cy="74" r="5" fill="var(--rt-amber)"/>
  <text x="329" y="63" text-anchor="middle" font-size="8" fill="var(--rt-amber)">held</text>
  <!-- f5 -->
  <rect x="370" y="50" width="74" height="48" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <line x1="374" y1="90" x2="440" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="417" cy="74" r="5" fill="var(--rt-signal)"/>
  <!-- f6 -->
  <rect x="448" y="50" width="74" height="48" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <line x1="452" y1="90" x2="518" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="506" cy="74" r="5" fill="var(--rt-signal)"/>
  <!-- f7 -->
  <rect x="526" y="50" width="74" height="48" fill="var(--rt-signal-soft)" stroke="var(--rt-line-strong)" stroke-width="0.75"/>
  <line x1="530" y1="90" x2="596" y2="90" stroke="var(--rt-line)" stroke-width="0.75"/>
  <circle cx="594" cy="74" r="5" fill="var(--rt-signal)"/>

  <text x="329" y="126" text-anchor="middle" font-size="10" fill="var(--rt-amber)">dropped frame → stutter</text>

  <!-- budget ruler: 0..40ms, 10px/ms from x=120 -->
  <path d="M120 176 H520" stroke="var(--rt-line-strong)" stroke-width="1"/>
  <!-- on-time frame -->
  <rect x="120" y="158" width="160" height="9" fill="var(--rt-signal)"/>
  <text x="284" y="166" font-size="9" fill="var(--rt-muted)">a frame: 16 ms budget</text>
  <!-- the janky frame -->
  <rect x="120" y="184" width="330" height="9" fill="var(--rt-amber)"/>
  <text x="454" y="192" font-size="9" fill="var(--rt-amber)">this one: 33 ms</text>
  <!-- budget line + myth correction -->
  <path d="M280 150 V200" stroke="var(--rt-muted)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M450 150 V200" stroke="var(--rt-amber)" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="450" y="146" text-anchor="middle" font-size="9" fill="var(--rt-amber)">jank = 2× refresh (JankStats)</text>
  <text x="150" y="146" font-size="9" fill="var(--rt-muted)" text-decoration="line-through">myth: jank at 16.67 ms</text>

  <text x="120" y="224" font-size="9" fill="var(--rt-muted)">budget = 16ms@60 · 11ms@90 · 8ms@120   ·   frozen frame &gt; 700 ms</text>
  <text x="120" y="242" font-size="11" fill="var(--rt-muted)">a dropped frame means the display holds the last one</text>
</svg>
