<svg viewBox="0 0 640 250" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" font-family="'IBM Plex Mono', monospace">
  <!-- eyebrow -->
  <text x="40" y="22" font-size="10" letter-spacing="0.12em" fill="var(--rt-muted)">NATIVE PORTS ONLY</text>

  <!-- center divider -->
  <line x1="320" y1="38" x2="320" y2="222" stroke="var(--rt-line)" stroke-width="1" stroke-dasharray="2 5"/>

  <!-- ============ LEFT · GOOD · DIRECT ============ -->
  <text x="40" y="46" font-size="10" letter-spacing="0.08em" fill="var(--rt-signal)">A &#183; NATIVE PORT, DIRECT</text>

  <!-- node -->
  <rect x="48" y="58" width="80" height="112" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <text x="82" y="80" text-anchor="middle" font-size="11" fill="var(--rt-ink)">NODE</text>
  <text x="82" y="98" text-anchor="middle" font-size="9" fill="var(--rt-muted)">cpu ~1%</text>
  <text x="82" y="111" text-anchor="middle" font-size="9" fill="var(--rt-muted)">ram 18mb</text>
  <!-- native ports on right edge -->
  <rect x="124" y="76" width="8" height="8" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <rect x="124" y="112" width="8" height="8" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <rect x="124" y="148" width="8" height="8" fill="var(--rt-signal-soft)" stroke="var(--rt-signal)" stroke-width="1"/>
  <text x="119" y="83" text-anchor="end" font-size="9" fill="var(--rt-muted)">P1</text>
  <text x="119" y="119" text-anchor="end" font-size="9" fill="var(--rt-muted)">P2</text>
  <text x="119" y="155" text-anchor="end" font-size="9" fill="var(--rt-muted)">P3</text>

  <!-- direct lines, one per port -->
  <line x1="132" y1="80" x2="224" y2="80" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <line x1="132" y1="116" x2="224" y2="116" stroke="var(--rt-signal)" stroke-width="1.5"/>
  <line x1="132" y1="152" x2="224" y2="152" stroke="var(--rt-signal)" stroke-width="1.5"/>

  <!-- phones, each on its own port -->
  <g stroke="var(--rt-signal)" stroke-width="1">
    <rect x="224" y="65" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="227" y="69" width="14" height="18" fill="var(--rt-signal-soft)"/>
    <line x1="231" y1="91" x2="237" y2="91"/>
    <rect x="224" y="101" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="227" y="105" width="14" height="18" fill="var(--rt-signal-soft)"/>
    <line x1="231" y1="127" x2="237" y2="127"/>
    <rect x="224" y="137" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="227" y="141" width="14" height="18" fill="var(--rt-signal-soft)"/>
    <line x1="231" y1="163" x2="237" y2="163"/>
  </g>

  <!-- check -->
  <path d="M258 115 l6 7 l13 -15" stroke="var(--rt-signal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- left labels -->
  <text x="164" y="198" text-anchor="middle" font-size="10" fill="var(--rt-signal)">NATIVE PORTS &#183; DIRECT</text>
  <text x="164" y="212" text-anchor="middle" font-size="9" fill="var(--rt-muted)">each on its own port</text>

  <!-- ============ RIGHT · RISKY · VIA HUB ============ -->
  <text x="344" y="46" font-size="10" letter-spacing="0.08em" fill="var(--rt-amber)">B &#183; THROUGH A HUB</text>

  <!-- node -->
  <rect x="344" y="84" width="64" height="64" fill="var(--rt-surface)" stroke="var(--rt-line-strong)" stroke-width="1.5"/>
  <text x="374" y="106" text-anchor="middle" font-size="11" fill="var(--rt-ink)">NODE</text>
  <text x="374" y="122" text-anchor="middle" font-size="9" fill="var(--rt-muted)">cpu ~1%</text>
  <rect x="404" y="111" width="8" height="8" fill="var(--rt-paper)" stroke="var(--rt-amber)" stroke-width="1"/>

  <!-- one port feeding the hub -->
  <text x="431" y="106" text-anchor="middle" font-size="9" fill="var(--rt-muted)">one port</text>
  <line x1="412" y1="115" x2="452" y2="115" stroke="var(--rt-amber)" stroke-width="1.5"/>

  <!-- hub -->
  <rect x="452" y="96" width="52" height="38" fill="var(--rt-paper)" stroke="var(--rt-amber)" stroke-width="1.5"/>
  <text x="478" y="113" text-anchor="middle" font-size="11" fill="var(--rt-amber)">HUB</text>
  <text x="478" y="127" text-anchor="middle" font-size="9" fill="var(--rt-muted)">1&#8594;4</text>

  <!-- fan-out from one shared port -->
  <line x1="504" y1="110" x2="560" y2="60" stroke="var(--rt-amber)" stroke-width="1"/>
  <line x1="504" y1="113" x2="560" y2="98" stroke="var(--rt-amber)" stroke-width="1"/>
  <line x1="504" y1="117" x2="560" y2="136" stroke="var(--rt-amber)" stroke-width="1"/>
  <line x1="504" y1="120" x2="560" y2="174" stroke="var(--rt-amber)" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>

  <!-- phones behind the hub -->
  <g stroke="var(--rt-amber)" stroke-width="1">
    <rect x="560" y="45" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="563" y="49" width="14" height="18" fill="var(--rt-surface)"/>
    <line x1="567" y1="71" x2="573" y2="71"/>
    <rect x="560" y="83" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="563" y="87" width="14" height="18" fill="var(--rt-surface)"/>
    <line x1="567" y1="109" x2="573" y2="109"/>
    <rect x="560" y="121" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="563" y="125" width="14" height="18" fill="var(--rt-surface)"/>
    <line x1="567" y1="147" x2="573" y2="147"/>
  </g>
  <!-- browned-out phone -->
  <g stroke="var(--rt-muted)" stroke-width="1" stroke-dasharray="3 2">
    <rect x="560" y="159" width="20" height="30" fill="var(--rt-paper)"/>
    <rect x="563" y="163" width="14" height="18" fill="var(--rt-surface)"/>
  </g>
  <text x="586" y="177" font-size="9" fill="var(--rt-amber)">dropped</text>

  <!-- right labels -->
  <text x="480" y="198" text-anchor="middle" font-size="10" fill="var(--rt-muted)"><tspan fill="var(--rt-amber)">HUB</tspan> &#183; shares one port&#8217;s power</text>
  <text x="480" y="212" text-anchor="middle" font-size="9" fill="var(--rt-amber)">shared power &#8594; brown-out</text>

  <!-- caption -->
  <text x="320" y="246" text-anchor="middle" font-size="11" fill="var(--rt-muted)">one less connection is one less part to debug</text>
</svg>
